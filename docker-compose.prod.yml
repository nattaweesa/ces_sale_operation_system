# Production Environment - Optimized for stability and performance
# Deploy with: docker compose -f docker-compose.prod.yml up -d
# No development flags, no hot-reload, proper error handling

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ces
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ces_secret_prod}
      POSTGRES_DB: ces_sale_operation
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ces"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://ces:${DB_PASSWORD:-ces_secret_prod}@db:5432/ces_sale_operation
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      STORAGE_PATH: /app/storage
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      ENVIRONMENT: production
    volumes:
      - storage_data_prod:/app/storage
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    restart: always
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-/api}
    volumes:
      - storage_data_prod:/app/storage:ro
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    command: npm run preview -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data_prod:
  storage_data_prod:
