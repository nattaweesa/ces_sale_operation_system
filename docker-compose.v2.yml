services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ces
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${V2_DATABASE_NAME:-ces_sale_operation_v2}
    ports:
      - "${V2_DB_PORT:-5435}:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ces"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://ces:${DB_PASSWORD}@db:5432/${V2_DATABASE_NAME:-ces_sale_operation_v2}
      SECRET_KEY: ${SECRET_KEY}
      STORAGE_PATH: /app/storage_v2
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5175}
      ENVIRONMENT: ${V2_ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${V2_BACKEND_PORT:-8100}:8000"
    volumes:
      - ./backend:/app
      - storage_data_v2:/app/storage_v2
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    restart: always
    environment:
      VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:8100}
      VITE_DEV_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "${V2_FRONTEND_PORT:-5175}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data_v2:
  storage_data_v2:
